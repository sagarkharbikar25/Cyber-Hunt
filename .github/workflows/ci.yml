name: CyberHunt CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Run TypeScript Compiler (Type Safety Check)
        run: npx tsc --noEmit

      - name: Run Linting Checks
        run: npm run lint
        continue-on-error: true # Let linting warnings pass but enforce build safety

      - name: Build Next.js Production App
        run: npm run build
        env:
          # Mock variables so the production builder compiles successfully without live keys
          NEXT_PUBLIC_SUPABASE_URL: "https://mock-ref.supabase.co"
          SUPABASE_SERVICE_ROLE_KEY: "mock-service-role-key"
          UPSTASH_REDIS_REST_URL: "https://mock.upstash.io"
          UPSTASH_REDIS_REST_TOKEN: "mock-token"
          NEXTAUTH_SECRET: "mock-auth-secret"
          CLEANUP_SECRET: "mock-reset-secret"
